{% extends 'roadmap/base.html' %}

{% block content %}

<div class="auth-card">

    <h2 class="mb-3">🔐 Login</h2>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}

        <button type="submit" class="btn btn-warning w-100">
            Login
        </button>
    </form>

    <p class="mt-3">
        Don’t have an account? <a href="/signup/">Signup</a>
    </p>

</div>

{% endblock %}
