<!DOCTYPE html>
<html>
<head>
    <title>Smart Roadmap</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #0f172a;
            color: white;
        }

        .sidebar {
            height: 100vh;
            width: 250px;
            position: fixed;
            background: #020617;
            padding: 20px;
        }

        .sidebar a {
            display: block;
            color: #94a3b8;
            padding: 10px;
            text-decoration: none;
            border-radius: 8px;
        }

        .sidebar a:hover {
            background: #1e293b;
            color: white;
        }

        .main-content {
            margin-left: 260px;
            padding: 20px;
        }

        .card-dark {
            background: #020617;
            border-radius: 12px;
            padding: 15px;
        }

        .progress {
            height: 8px;
            background: #1e293b;
        }

        .progress-bar {
            background: orange;
        }

       

.topic-card {
    background: #020617;
    padding: 15px;
    border-radius: 10px;
    border: 1px solid #1e293b;
}

.video-list {
    margin-left: 10px;
}

.video-item {
    display: block;
    padding: 6px 10px;
    margin-bottom: 5px;
    border-radius: 6px;
    background: #020617;
    color: #60a5fa;
    text-decoration: none;
    font-size: 14px;
}

.video-item:hover {
    background: #1e293b;
    color: white;
}

h4 {
    font-weight: 600;
}
/* 🔥 HERO */
.hero-section {
    padding: 40px 20px;
}

.hero-title {
    font-size: 36px;
    font-weight: 700;
    color: #60a5fa;
}

.hero-subtitle {
    color: #94a3b8;
    font-size: 16px;
}

/* 🔥 DOMAIN CARDS */
.domain-card {
    background: #020617;
    padding: 20px;
    border-radius: 12px;
    margin-bottom: 20px;
    border: 1px solid #1e293b;
    transition: 0.3s;
}

.domain-card:hover {
    transform: translateY(-5px);
    border-color: orange;
}

.domain-card h4 {
    color: #f8fafc;
}

.auth-card {
    max-width: 400px;
    margin: 80px auto;
    padding: 25px;
    background: #020617;
    border-radius: 12px;
    border: 1px solid #1e293b;
}

</style>
   
</head>
<body>

<!-- 🔹 Sidebar -->
<div class="sidebar">
    <a href="/" class="btn btn-outline-light me-2">Home</a>
    <a href="/dashboard/" class="btn btn-outline-light me-2">Dashboard</a>

    {% if user.is_authenticated %}
        <span class="text-light me-2">👤 {{ user.username }}</span>
        <form action="{% url 'logout' %}" method="post" style="display:inline;">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">
        Logout
    </button>
</form>
    {% else %}
        <a href="/login/" class="btn btn-success me-2">Login</a>
        <a href="/signup/" class="btn btn-warning">Signup</a>
    {% endif %}
</div>

<!-- 🔹 Main Content -->
<div class="main-content">
    {% block content %}{% endblock %}
</div>

</body>
</html>
