{% extends 'roadmap/base.html' %}

{% block content %}

<div class="auth-card">

    <h2 class="mb-3">📝 Create Account</h2>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}

        <button type="submit" class="btn btn-success w-100">
            Signup
        </button>
    </form>

    <p class="mt-3">
        Already have an account? <a href="/login/">Login</a>
    </p>

</div>

{% endblock %}
